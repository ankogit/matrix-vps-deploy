# Конфиг для внешнего nginx (сервер-шлюз).
# Замените MATRIX_SERVER_IP на внутренний IP сервера с Docker Compose.

server {
    listen 443 ssl;
    server_name matrix.nonza.ru;

    ssl_certificate     /etc/letsencrypt/live/matrix.nonza.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.nonza.ru/privkey.pem;

    # Matrix well-known
    location /.well-known/matrix/server {
        return 200 '{"m.server":"matrix.nonza.ru:443"}';
        add_header Content-Type application/json;
    }

    location /.well-known/matrix/client {
        return 200 '{"m.homeserver":{"base_url":"https://matrix.nonza.ru"},"org.matrix.msc4143.rtc_foci":[{"type":"livekit","livekit_service_url":"https://matrix.nonza.ru/livekit/jwt"}]}';
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Страница регистрации / смены пароля (статика отдаётся nginx:alpine на порту 8888)
    location = /account {
        proxy_pass http://MATRIX_SERVER_IP:8888/account.html;
        proxy_set_header Host $host;
    }

    # LiveKit JWT-сервис
    location /livekit/jwt/ {
        proxy_pass http://MATRIX_SERVER_IP:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiveKit SFU (WebSocket)
    location /livekit/sfu/ {
        proxy_pass http://MATRIX_SERVER_IP:7884/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # Matrix (conduwuit)
    location / {
        proxy_pass http://MATRIX_SERVER_IP:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 110M;
    }
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name matrix.nonza.ru;
    return 301 https://$host$request_uri;
}
